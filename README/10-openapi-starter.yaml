openapi: 3.0.3
info:
  title: Morning Command Dashboard API
  version: 1.0.0
  description: Starter OpenAPI spec aligned with README/09-api-contracts.md
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Sync
  - name: Tasks
  - name: Briefing
  - name: Dashboard
paths:
  /auth/google/start:
    post:
      tags: [Auth]
      summary: Start Google OAuth flow
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                return_to:
                  type: string
                  example: /dashboard
      responses:
        '200':
          description: OAuth URL generated
          content:
            application/json:
              schema:
                type: object
                required: [auth_url, state]
                properties:
                  auth_url:
                    type: string
                    format: uri
                  state:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/google/callback:
    get:
      tags: [Auth]
      summary: OAuth callback endpoint
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to app page
        '400':
          $ref: '#/components/responses/BadRequest'
  /sync/gmail:
    post:
      tags: [Sync]
      summary: Queue Gmail sync job
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                lookback_days:
                  type: integer
                  minimum: 1
                  maximum: 90
                  default: 14
                query:
                  type: string
                  example: in:inbox newer_than:14d
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueuedJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /sync/calendar:
    post:
      tags: [Sync]
      summary: Queue Calendar sync job
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                range_start:
                  type: string
                  format: date-time
                range_end:
                  type: string
                  format: date-time
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueuedJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /sync/jobs/{job_id}:
    get:
      tags: [Sync]
      summary: Get sync job status
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncJobStatus'
        '404':
          $ref: '#/components/responses/NotFound'
  /tasks/recompute:
    post:
      tags: [Tasks]
      summary: Recompute derived tasks and scores
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  type: string
                  enum: [changed_only, all_recent]
                  default: changed_only
      responses:
        '200':
          description: Recompute result
          content:
            application/json:
              schema:
                type: object
                required: [recomputed, updated]
                properties:
                  recomputed:
                    type: integer
                  updated:
                    type: integer
  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - in: query
          name: urgency
          schema:
            $ref: '#/components/schemas/TaskUrgency'
        - in: query
          name: category
          schema:
            $ref: '#/components/schemas/TaskCategory'
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: Paginated tasks
          content:
            application/json:
              schema:
                type: object
                required: [items, next_cursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  next_cursor:
                    type: string
                    nullable: true
  /tasks/{task_id}:
    patch:
      tags: [Tasks]
      summary: Update task state or scheduling
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                type: object
                required: [id, status, updated_at]
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    $ref: '#/components/schemas/TaskStatus'
                  updated_at:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
  /briefing/today:
    get:
      tags: [Briefing]
      summary: Get today's briefing
      responses:
        '200':
          description: Briefing payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodayBriefing'
  /briefing/generate:
    post:
      tags: [Briefing]
      summary: Generate or regenerate today's briefing
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Generation result
          content:
            application/json:
              schema:
                type: object
                required: [briefing_date, generated]
                properties:
                  briefing_date:
                    type: string
                    format: date
                  generated:
                    type: boolean
  /briefing/send:
    post:
      tags: [Briefing]
      summary: Send today's briefing via configured channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel]
              properties:
                channel:
                  type: string
                  enum: [email, slack]
      responses:
        '200':
          description: Send result
          content:
            application/json:
              schema:
                type: object
                required: [sent, channel, sent_at]
                properties:
                  sent:
                    type: boolean
                  channel:
                    type: string
                    enum: [email, slack]
                  sent_at:
                    type: string
                    format: date-time
  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Get compact payload for dashboard home
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
  /internal/jobs/daily-briefing:
    post:
      tags: [Briefing]
      summary: Internal scheduler trigger for daily briefing
      security:
        - InternalToken: []
      responses:
        '200':
          description: Trigger accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, briefing_date]
                properties:
                  ok:
                    type: boolean
                  briefing_date:
                    type: string
                    format: date
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    InternalToken:
      type: apiKey
      in: header
      name: X-Internal-Token
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    QueuedJob:
      type: object
      required: [job_id, status]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued]
    SyncJobStatus:
      type: object
      required: [job_id, provider, status, started_at, metrics]
      properties:
        job_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [gmail, calendar]
        status:
          type: string
          enum: [queued, running, completed, failed]
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        metrics:
          type: object
          required: [fetched, written, failed]
          properties:
            fetched:
              type: integer
            written:
              type: integer
            failed:
              type: integer
    TaskCategory:
      type: string
      enum: [Development, Customer, Finance, Marketing, Admin]
    TaskActionType:
      type: string
      enum: [Reply, Pay, Build, Schedule, Review]
    TaskUrgency:
      type: string
      enum: [Today, ThisWeek, Later]
    TaskStatus:
      type: string
      enum: [Open, Done, Snoozed]
    Task:
      type: object
      required:
        - id
        - source_type
        - source_id
        - category
        - action_type
        - urgency
        - title
        - priority_score
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        source_type:
          type: string
          enum: [email, calendar]
        source_id:
          type: string
          format: uuid
        category:
          $ref: '#/components/schemas/TaskCategory'
        action_type:
          $ref: '#/components/schemas/TaskActionType'
        urgency:
          $ref: '#/components/schemas/TaskUrgency'
        title:
          type: string
        details:
          type: string
          nullable: true
        due_at:
          type: string
          format: date-time
          nullable: true
        priority_score:
          type: number
        status:
          $ref: '#/components/schemas/TaskStatus'
        snoozed_until:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TaskUpdateRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/TaskStatus'
        snoozed_until:
          type: string
          format: date
      additionalProperties: false
    TodayBriefing:
      type: object
      required: [briefing_date, content_markdown, generated_at]
      properties:
        briefing_date:
          type: string
          format: date
        content_markdown:
          type: string
        generated_at:
          type: string
          format: date-time
        sent_at:
          type: string
          format: date-time
          nullable: true
    DashboardSummary:
      type: object
      required: [today_focus, customers, finance, calendar, last_sync]
      properties:
        today_focus:
          type: array
          items:
            type: object
            required: [task_id, title, category, priority_score]
            properties:
              task_id:
                type: string
                format: uuid
              title:
                type: string
              category:
                $ref: '#/components/schemas/TaskCategory'
              priority_score:
                type: number
        customers:
          type: object
          required: [open_replies, top_items]
          properties:
            open_replies:
              type: integer
            top_items:
              type: array
              items:
                $ref: '#/components/schemas/Task'
        finance:
          type: object
          required: [due_next_7_days, top_items]
          properties:
            due_next_7_days:
              type: integer
            top_items:
              type: array
              items:
                $ref: '#/components/schemas/Task'
        calendar:
          type: object
          required: [meetings_today, next_event_start]
          properties:
            meetings_today:
              type: integer
            next_event_start:
              type: string
              format: date-time
              nullable: true
        last_sync:
          type: object
          required: [gmail, calendar]
          properties:
            gmail:
              type: string
              format: date-time
              nullable: true
            calendar:
              type: string
              format: date-time
              nullable: true
